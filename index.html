<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JetBlue VA - Apply</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#061a2b;
color:white;
height:100vh;
display:flex;
}

/* LEFT SIDE */
.left{
width:320px;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.05);
padding:30px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
font-size:18px;
font-weight:700;
color:#4fc3ff;
}

.nav{
margin-top:30px;
display:flex;
flex-direction:column;
gap:12px;
}

.nav a{
color:white;
text-decoration:none;
font-size:13px;
opacity:0.6;
transition:0.3s;
}

.nav a:hover{
opacity:1;
color:#4fc3ff;
}

/* VERIFY BUTTON */
.verify{
margin-top:20px;
padding:12px;
border-radius:10px;
background:#00aaff;
text-align:center;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.verify:hover{
box-shadow:0 0 15px #00aaff;
transform:scale(1.03);
}

/* RIGHT SIDE */
.right{
flex:1;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* CARD */
.card{
max-width:600px;
background:rgba(255,255,255,0.04);
padding:30px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
animation:fade 0.6s ease;
}

h1{
font-size:26px;
margin-bottom:10px;
}

p{
opacity:0.6;
font-size:13px;
margin-bottom:20px;
line-height:1.5;
}

/* FORM */
input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
outline:none;
background:rgba(0,0,0,0.3);
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00aaff,#0077ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #00aaff;
}

/* STATUS */
.status{
margin-top:10px;
font-size:12px;
opacity:0.7;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<!-- LEFT PANEL -->
<div class="left">

<div>
<div class="logo">JetBlue VA</div>

<div class="nav">
<a href="#">Home</a>
<a href="#">Apply</a>
<a href="#">Flights</a>
</div>

<!-- VERIFY BUTTON -->
<div class="verify" onclick="loginDiscord()">
🔵 Verify with Discord
</div>

<div class="status" id="status">
Not verified
</div>
</div>

<div style="opacity:0.4;font-size:11px">
© JetBlue Virtual Airline
</div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<div class="card">

<h1>Application Form</h1>
<p>
Complete your application after verifying your Discord account.
This ensures secure access and proper role assignment.
</p>

<input placeholder="Roblox Username">
<input placeholder="Timezone">
<input placeholder="PTFS Experience">

<textarea placeholder="Why do you want to join JetBlue VA?"></textarea>

<select>
<option>Select Role</option>
<option>Pilot</option>
<option>Cabin Crew</option>
<option>Ground Staff</option>
</select>

<button onclick="submitApp()">Submit Application</button>

</div>

</div>

<script>

/* REDIRECT TO DISCORD LOGIN */
function loginDiscord(){
window.location.href="/api/callback";
}

/* CHECK TOKEN */
const token = localStorage.getItem("token");

if(token){
document.getElementById("status").innerText = "Verified ✔";
}

/* FAKE SUBMIT (replace later with backend) */
function submitApp(){

if(!localStorage.getItem("token")){
alert("You must verify with Discord first");
return;
}

alert("Application submitted successfully ✔");
}

</script>

</body>
</html>
