<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JetBlue Virtual Airline</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(120deg,#061a2b,#0a2a44,#061a2b);
background-size:300% 300%;
animation:bgMove 14s ease infinite;
z-index:-3;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* FLOATING GLOW ORBS */
.orb{
position:absolute;
width:400px;
height:400px;
background:#00aaff22;
filter:blur(100px);
border-radius:50%;
animation:float 10s ease-in-out infinite;
z-index:-2;
}

.orb1{top:10%;left:10%}
.orb2{bottom:10%;right:10%}

@keyframes float{
0%,100%{transform:translateY(0px)}
50%{transform:translateY(-50px)}
}

/* TOP BAR */
.topbar{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
font-size:12px;
opacity:0.6;
}

/* HERO SECTION */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.title{
font-size:64px;
font-weight:700;
background:linear-gradient(90deg,#4fc3ff,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeDown 1s ease;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-30px)}
to{opacity:1;transform:translateY(0)}
}

.subtitle{
margin-top:12px;
opacity:0.7;
font-size:15px;
max-width:500px;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:0.7}
}

/* BUTTONS */
.buttons{
margin-top:30px;
display:flex;
gap:15px;
animation:fadeUp 2s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.btn{
padding:12px 22px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:0.3s;
font-size:14px;
}

.primary{
background:linear-gradient(90deg,#00aaff,#0077ff);
color:white;
}

.primary:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(0,170,255,0.4);
}

.secondary{
border:1px solid rgba(255,255,255,0.2);
color:white;
}

.secondary:hover{
background:rgba(255,255,255,0.1);
transform:scale(1.08);
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
text-align:center;
width:100%;
font-size:11px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="topbar">
<div>JetBlue Virtual Airline</div>
<div>PTFS Division</div>
</div>

<div class="hero">

<div class="title">JetBlue Virtual</div>

<div class="subtitle">
Premium Roblox PTFS Airline Experience — Built for aviation roleplay, events, and realistic airline operations.
</div>

<div class="buttons">
<a class="btn primary" href="apply.html">Apply Now</a>
<a class="btn secondary" href="admin.html">Admin Panel</a>
</div>

</div>

<div class="footer">
© JetBlue Virtual Airline • Roblox PTFS Community
</div>

</body>
</html>
