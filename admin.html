<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#061a2b;
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
position:fixed;
width:100%;
top:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
opacity:0.7;
font-size:13px;
}

nav a:hover{
opacity:1;
color:#4fc3ff;
}

/* GRID */
.container{
display:grid;
grid-template-columns:250px 1fr;
height:100vh;
padding-top:70px;
}

/* SIDEBAR */
.sidebar{
background:rgba(255,255,255,0.03);
padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h3{
color:#4fc3ff;
}

.sidebar p{
font-size:12px;
opacity:0.6;
margin:10px 0;
cursor:pointer;
}

/* MAIN */
.main{
padding:30px;
overflow:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
}

.card h2{
color:#4fc3ff;
}

.table{
margin-top:30px;
background:rgba(255,255,255,0.03);
padding:20px;
border-radius:15px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
font-size:13px;
}

/* BUTTON */
.btn{
padding:8px 12px;
border-radius:8px;
background:#00aaff;
border:none;
color:white;
cursor:pointer;
}

.btn:hover{
box-shadow:0 0 10px #00aaff;
}

</style>
</head>

<body>

<nav>
<div>JetBlue Admin</div>
<div>
<a href="index.html">Home</a>
<a href="apply.html">Applications</a>
</div>
</nav>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Dashboard</h3>
<p>Overview</p>
<p>Applications</p>
<p>Members</p>
<p>Flights</p>
<p>Settings</p>
</div>

<!-- MAIN -->
<div class="main">

<div class="cards">

<div class="card">
<h2>120+</h2>
<p>Members</p>
</div>

<div class="card">
<h2>8</h2>
<p>Pending Applications</p>
</div>

<div class="card">
<h2>3</h2>
<p>Active Flights</p>
</div>

</div>

<div class="table">

<h3>Recent Applications</h3>

<div class="row">
<span>User: test</span>
<span>Status: Pending</span>
<button class="btn">Review</button>
</div>

<div class="row">
<span>User: example</span>
<span>Status: Accepted</span>
<button class="btn">View</button>
</div>

</div>

</div>

</div>

</body>
</html>
