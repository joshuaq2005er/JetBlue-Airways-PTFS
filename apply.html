<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Applications - JetBlue VA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#061a2b;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-size:13px;
opacity:0.7;
}

.nav a:hover{
opacity:1;
color:#4fc3ff;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:30px;
}

/* HEADER */
.header{
margin-top:20px;
}

.header h2{
font-size:20px;
}

.header p{
opacity:0.6;
font-size:12px;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
}

/* FORM */
input,textarea,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:rgba(0,0,0,0.3);
color:white;
outline:none;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#00aaff;
color:white;
cursor:pointer;
}

button:hover{
box-shadow:0 0 10px #00aaff;
}

/* USER INFO */
.userbox{
padding:10px;
background:rgba(0,170,255,0.1);
border:1px solid rgba(0,170,255,0.2);
border-radius:10px;
font-size:12px;
}

/* TABLE */
.table{
margin-top:30px;
background:rgba(255,255,255,0.03);
padding:15px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
font-size:13px;
}

.status{
color:#ffcc00;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<div>JetBlue VA - Applications</div>
<div class="nav">
<a href="index.html">Home</a>
<a href="apply.html">Apply</a>
</div>
</div>

<div class="container">

<!-- HEADER -->
<div class="header">
<h2>Application Form</h2>
<p>Submit directly so HR can process everything in one pipeline.</p>
</div>

<!-- USER INFO -->
<div class="userbox" id="userInfo">
Signed in as Guest | Discord not verified
</div>

<!-- GRID -->
<div class="grid">

<!-- FORM -->
<div class="card">

<h3>Submit Application</h3>

<select id="formType">
<option>Career Application Form</option>
</select>

<input id="roblox" placeholder="Roblox username">
<input id="timezone" placeholder="Timezone">
<input id="exp" placeholder="PTFS experience">

<textarea id="reason" placeholder="Why do you want to join?"></textarea>

<button onclick="submitApp()">Submit Application</button>

</div>

<!-- INFO PANEL -->
<div class="card">
<h3>My Applications</h3>
<p style="opacity:0.6;font-size:12px;margin-top:5px;">
Track your submitted applications below
</p>
</div>

</div>

<!-- APPLICATION LIST -->
<div class="table">
<h3 style="margin-bottom:10px;">Submitted</h3>

<div id="list"></div>

</div>

</div>

<script>

/* LOAD USER */
const token = localStorage.getItem("token");

if(token){
document.getElementById("userInfo").innerText =
"Signed in as Verified User | Discord ID: " + token.slice(0,10) + "...";
}

/* STORAGE SYSTEM */
let apps = JSON.parse(localStorage.getItem("apps") || "[]");

/* RENDER */
function render(){

const list = document.getElementById("list");
list.innerHTML = "";

apps.forEach(app=>{

list.innerHTML += `
<div class="row">
<span>${app.date} - ${app.roblox}</span>
<span class="status">${app.status}</span>
</div>
`;

});

}

render();

/* SUBMIT APPLICATION */
function submitApp(){

if(!localStorage.getItem("token")){
alert("You must verify with Discord first");
return;
}

const roblox = document.getElementById("roblox").value;
const timezone = document.getElementById("timezone").value;
const exp = document.getElementById("exp").value;
const reason = document.getElementById("reason").value;

const newApp = {
date:new Date().toLocaleString(),
roblox:roblox,
timezone:timezone,
exp:exp,
reason:reason,
status:"Pending HR review"
};

apps.push(newApp);
localStorage.setItem("apps", JSON.stringify(apps));

alert("Application submitted successfully ✔");

render();

}

</script>

</body>
</html>
